[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:dbus]
command=/usr/bin/dbus-daemon --session --nofork --address=unix:path=/tmp/dbus-session
autorestart=true
priority=100
stdout_logfile=/var/log/dbus.log
stderr_logfile=/var/log/dbus-err.log

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1280x1024x24 +extension RANDR
autorestart=true
priority=200
stdout_logfile=/var/log/xvfb.log
stderr_logfile=/var/log/xvfb-err.log

[program:openbox]
command=/usr/bin/openbox
autorestart=true
priority=300
environment=DISPLAY=":99"
stdout_logfile=/var/log/openbox.log
stderr_logfile=/var/log/openbox-err.log

[program:x11vnc]
command=/usr/bin/x11vnc -display :99 -forever -nopw -shared -rfbport 5900
autorestart=true
priority=400
stdout_logfile=/var/log/x11vnc.log
stderr_logfile=/var/log/x11vnc-err.log

[program:websockify]
command=/usr/bin/websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=500
stdout_logfile=/var/log/websockify.log
stderr_logfile=/var/log/websockify-err.log

[program:mosquitto]
command=/usr/sbin/mosquitto -c /etc/mosquitto/mosquitto.conf
autorestart=true
priority=50
stdout_logfile=/var/log/mosquitto.log
stderr_logfile=/var/log/mosquitto-err.log
